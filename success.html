<!DOCTYPE html>
<html lang="en" style="cursor:none">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Order Confirmed · PNC</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22><rect width=%2232%22 height=%2232%22 fill=%22%232A1810%22/><text x=%2216%22 y=%2222%22 font-size=%2210%22 font-family=%22Helvetica Neue,Helvetica,Arial,sans-serif%22 font-weight=%22900%22 fill=%22%23F8F4EC%22 text-anchor=%22middle%22 letter-spacing=%22-0.5%22>PNC</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#2A1810;color:#F8F4EC;-webkit-font-smoothing:antialiased;cursor:none}
*{cursor:none!important}
a,button{cursor:none!important}
@media(pointer:coarse){*{cursor:auto!important}a,button{cursor:pointer!important}}
#cur-dot{
  position:fixed;top:0;left:0;width:10px;height:10px;
  border-radius:0;background:#F8F4EC;
  pointer-events:none;z-index:9999;
  transform:translate(-9999px,-9999px);
  transition:transform 40ms linear,background 0ms;
}
#cur-ring{
  position:fixed;top:0;left:0;width:96px;height:96px;
  border-radius:0;border:1.5px solid rgba(248,244,236,0.6);
  pointer-events:none;z-index:9998;
  transform:translate(-9999px,-9999px);
  transition:border-color 0ms,width .22s cubic-bezier(.16,1,.3,1),height .22s cubic-bezier(.16,1,.3,1),opacity 160ms ease;
}
body{
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:clamp(40px,8vw,80px) clamp(24px,5vw,80px);
  text-align:center;position:relative;overflow:hidden;
}
/* Grid overlay */
body::before{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(248,220,160,0.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(180,130,60,0.12) 1px,transparent 1px);
  background-size:100% 80px,calc(100%/7) 100%;
  pointer-events:none;
}
/* Ambient glow */
body::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 50% at 50% 40%,rgba(248,200,100,0.06) 0%,transparent 70%);
  pointer-events:none;
}
.eyebrow{
  font-family:'Courier New',monospace;
  font-size:11px;font-weight:600;letter-spacing:0.30em;text-transform:uppercase;
  color:rgba(248,244,236,0.35);
  margin-bottom:clamp(20px,3vh,36px);
}
/* Checkmark */
.check-wrap{
  margin-bottom:clamp(20px,3vh,36px);
  position:relative;
}
.check-circle{
  width:64px;height:64px;border-radius:50%;
  border:1.5px solid rgba(248,244,236,0.18);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto;
  animation:fadeScaleIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
}
.check-circle svg{
  width:28px;height:28px;
  stroke:#F8F4EC;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;
  fill:none;
  stroke-dasharray:40;
  stroke-dashoffset:40;
  animation:drawCheck 0.5s cubic-bezier(0.16,1,0.3,1) 0.35s forwards;
}
@keyframes fadeScaleIn{
  from{opacity:0;transform:scale(0.7);}
  to{opacity:1;transform:scale(1);}
}
@keyframes drawCheck{
  to{stroke-dashoffset:0;}
}
.headline{
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  font-weight:900;font-size:clamp(28px,4.5vw,56px);
  letter-spacing:-0.035em;line-height:0.95;
  color:#F8F4EC;
  margin-bottom:clamp(16px,2.5vh,28px);
}
.body{
  font-size:clamp(14px,1.4vw,17px);font-weight:300;
  color:rgba(248,244,236,0.55);line-height:1.75;
  max-width:420px;
  margin-bottom:clamp(32px,5vh,56px);
}
.body strong{
  color:rgba(248,244,236,0.85);font-weight:500;
}
/* Session ID detail */
.session-ref{
  font-family:'Courier New',monospace;
  font-size:10px;letter-spacing:0.18em;text-transform:uppercase;
  color:rgba(248,244,236,0.20);
  margin-bottom:clamp(32px,5vh,56px);
  word-break:break-all;
  max-width:420px;
}
.cta-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
.btn-back{
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  font-weight:700;font-size:12px;letter-spacing:0.20em;text-transform:uppercase;
  background:#F8F4EC;color:#2A1810;padding:14px 28px;
  text-decoration:none;display:inline-block;
  transition:background .2s,color .2s;
}
.btn-back:hover{background:rgba(248,244,236,0.85)}
.btn-ghost{
  font-family:'Courier New',monospace;
  font-weight:600;font-size:11px;letter-spacing:0.22em;text-transform:uppercase;
  border:1px solid rgba(248,244,236,0.25);color:rgba(248,244,236,0.65);
  padding:14px 24px;text-decoration:none;display:inline-block;
  transition:border-color .2s,color .2s;
}
.btn-ghost:hover{border-color:rgba(248,244,236,0.55);color:#F8F4EC;}
.rule{width:40px;height:1px;background:rgba(248,244,236,0.12);margin:clamp(32px,5vh,56px) auto 0;}
.foot{
  margin-top:clamp(16px,2.5vh,28px);
  font-family:'Courier New',monospace;font-size:10px;letter-spacing:0.24em;
  text-transform:uppercase;color:rgba(248,244,236,0.22);
}
</style>
</head>
<body>
<div id="cur-dot" aria-hidden="true"></div>
<div id="cur-ring" aria-hidden="true"></div>

<p class="eyebrow">— Order Confirmed —</p>

<div class="check-wrap" aria-hidden="true">
  <div class="check-circle">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
</div>

<h1 class="headline">Your order<br>is placed.</h1>

<p class="body">
  Thank you. A confirmation has been sent to your email.<br>
  <strong>We bake and ship within 3–5 business days.</strong><br>
  Questions? <a href="mailto:hello@pncbread.love" style="color:rgba(248,244,236,0.65);text-decoration:none;border-bottom:1px solid rgba(248,244,236,0.25);">hello@pncbread.love</a>
</p>

<p class="session-ref" id="ref-line"></p>

<div class="cta-row">
  <a href="/home.html" class="btn-back">Back to PNC →</a>
  <a href="/bread" class="btn-ghost">Bread</a>
  <a href="/brew" class="btn-ghost">Brew</a>
</div>

<div class="rule"></div>
<p class="foot">Panem Nostrum Cotidianum · MMXXVI</p>

<script>
/* Show session reference from URL */
(function(){
  var params = new URLSearchParams(window.location.search);
  var sid = params.get('session_id');
  var el = document.getElementById('ref-line');
  if(sid && el) el.textContent = 'Ref · ' + sid;
})();
</script>
<script src="cursor-square.js"></script>
<script src="pnc-transitions.js" defer></script>
</body>
</html>
