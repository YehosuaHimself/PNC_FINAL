<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Order Canceled · PNC</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22><rect width=%2232%22 height=%2232%22 fill=%22%232A1810%22/><text x=%2216%22 y=%2222%22 font-size=%2210%22 font-family=%22Helvetica Neue,Helvetica,Arial,sans-serif%22 font-weight=%22900%22 fill=%22%23F8F4EC%22 text-anchor=%22middle%22 letter-spacing=%22-0.5%22>PNC</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#2A1810;color:#F8F4EC;-webkit-font-smoothing:antialiased;cursor:none}
*{cursor:none!important}
a,button{cursor:none!important}
@media(pointer:coarse){*{cursor:auto!important}a,button{cursor:pointer!important}}
#cur-dot{
  position:fixed;top:0;left:0;width:10px;height:10px;
  border-radius:50%;background:#F8F4EC;
  pointer-events:none;z-index:9999;
  transform:translate(-9999px,-9999px);
  transition:transform 40ms linear,opacity 160ms ease;
}
#cur-ring{
  position:fixed;top:0;left:0;width:32px;height:32px;
  border-radius:50%;border:1.5px solid rgba(248,244,236,0.5);
  pointer-events:none;z-index:9998;
  transform:translate(-9999px,-9999px);
  transition:opacity 200ms ease;
}
body{
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:clamp(40px,8vw,80px) clamp(24px,5vw,80px);
  text-align:center;position:relative;overflow:hidden;
}
/* Grid overlay */
body::before{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(248,220,160,0.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(180,130,60,0.12) 1px,transparent 1px);
  background-size:100% 80px,calc(100%/7) 100%;
  pointer-events:none;
}
/* Ambient glow */
body::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 50% at 50% 40%,rgba(248,200,100,0.06) 0%,transparent 70%);
  pointer-events:none;
}
.eyebrow{
  font-family:'Courier New',monospace;
  font-size:11px;font-weight:600;letter-spacing:0.30em;text-transform:uppercase;
  color:rgba(248,244,236,0.35);
  margin-bottom:clamp(20px,3vh,36px);
}
/* X icon */
.x-wrap{
  margin-bottom:clamp(20px,3vh,36px);
  position:relative;
}
.x-circle{
  width:64px;height:64px;border-radius:50%;
  border:1.5px solid rgba(248,244,236,0.18);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto;
  animation:fadeScaleIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
}
.x-circle svg{
  width:26px;height:26px;
  stroke:rgba(248,244,236,0.55);stroke-width:2;stroke-linecap:round;
  fill:none;
  opacity:0;
  animation:fadeIn 0.4s cubic-bezier(0.16,1,0.3,1) 0.35s forwards;
}
@keyframes fadeScaleIn{
  from{opacity:0;transform:scale(0.7);}
  to{opacity:1;transform:scale(1);}
}
@keyframes fadeIn{
  to{opacity:1;}
}
.headline{
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  font-weight:900;font-size:clamp(28px,4.5vw,56px);
  letter-spacing:-0.035em;line-height:0.95;
  color:#F8F4EC;
  margin-bottom:clamp(16px,2.5vh,28px);
}
.body{
  font-size:clamp(14px,1.4vw,17px);font-weight:300;
  color:rgba(248,244,236,0.55);line-height:1.75;
  max-width:420px;
  margin-bottom:clamp(32px,5vh,56px);
}
.body strong{
  color:rgba(248,244,236,0.85);font-weight:500;
}
.cta-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
.btn-back{
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  font-weight:700;font-size:12px;letter-spacing:0.20em;text-transform:uppercase;
  background:#F8F4EC;color:#2A1810;padding:14px 28px;
  text-decoration:none;display:inline-block;
  transition:background .2s,color .2s;
}
.btn-back:hover{background:rgba(248,244,236,0.85)}
.btn-ghost{
  font-family:'Courier New',monospace;
  font-weight:600;font-size:11px;letter-spacing:0.22em;text-transform:uppercase;
  border:1px solid rgba(248,244,236,0.25);color:rgba(248,244,236,0.65);
  padding:14px 24px;text-decoration:none;display:inline-block;
  transition:border-color .2s,color .2s;
}
.btn-ghost:hover{border-color:rgba(248,244,236,0.55);color:#F8F4EC;}
.rule{width:40px;height:1px;background:rgba(248,244,236,0.12);margin:clamp(32px,5vh,56px) auto 0;}
.foot{
  margin-top:clamp(16px,2.5vh,28px);
  font-family:'Courier New',monospace;font-size:10px;letter-spacing:0.24em;
  text-transform:uppercase;color:rgba(248,244,236,0.22);
}
</style>
</head>
<body>
<div id="cur-dot" aria-hidden="true"></div>
<div id="cur-ring" aria-hidden="true"></div>

<p class="eyebrow">— Order Canceled —</p>

<div class="x-wrap" aria-hidden="true">
  <div class="x-circle">
    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </div>
</div>

<h1 class="headline">Order not<br>placed.</h1>

<p class="body">
  You left before completing checkout.<br>
  <strong>Nothing was charged.</strong><br>
  Whenever you're ready, we'll be here.
</p>

<div class="cta-row">
  <a href="/bread" class="btn-back">Order Bread →</a>
  <a href="/brew" class="btn-ghost">Brew</a>
  <a href="/home.html" class="btn-ghost">Home</a>
</div>

<div class="rule"></div>
<p class="foot">Panem Nostrum Cotidianum · MMXXVI</p>

<script>
/* Custom cursor — identical to 404 */
(function(){
  var dot = document.getElementById('cur-dot');
  var ring = document.getElementById('cur-ring');
  if (!dot || window.matchMedia('(pointer:coarse)').matches) return;
  var mx=-9999,my=-9999,rx=-9999,ry=-9999,raf=null,s=0;
  var LERP=0.14, DR=5, RR=16;
  dot.style.willChange='transform';
  ring.style.willChange='transform';
  function loop(){
    var dx=(mx-RR)-rx, dy=(my-RR)-ry;
    rx+=dx*LERP; ry+=dy*LERP;
    dot.style.transform='translate3d('+(mx-DR)+'px,'+(my-DR)+'px,0)';
    ring.style.transform='translate3d('+rx+'px,'+ry+'px,0)';
    if(Math.abs(dx)<0.3&&Math.abs(dy)<0.3){if(++s>4){raf=null;return;}}else{s=0;}
    raf=requestAnimationFrame(loop);
  }
  function go(){s=0;if(raf===null)raf=requestAnimationFrame(loop);}
  document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;go();},{passive:true});
  document.addEventListener('mouseleave',function(){
    mx=-9999;my=-9999;
    dot.style.transform='translate3d(-9999px,-9999px,0)';
    ring.style.transform='translate3d(-9999px,-9999px,0)';
  });
  document.querySelectorAll('a,button').forEach(function(el){
    el.addEventListener('mouseenter',function(){ring.style.width='44px';ring.style.height='44px';ring.style.marginLeft='-6px';ring.style.marginTop='-6px';ring.style.opacity='0.8';go();});
    el.addEventListener('mouseleave',function(){ring.style.width='32px';ring.style.height='32px';ring.style.marginLeft='';ring.style.marginTop='';ring.style.opacity='';go();});
  });
})();
</script>
</body>
</html>
